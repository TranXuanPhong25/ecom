apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: cors
  namespace: kong
  annotations:
    kubernetes.io/ingress.class: kong
plugin: cors
config:
  origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
    - "http://localhost:3002"
    - "http://localhost:5173"
    - "https://seller.shopiew.me"
    - "https://shopiew.me"
    - "https://www.shopiew.me"
    - "https://admin.shopiew.com"
  methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
    - PATCH
  headers:
    - Accept
    - Accept-Version
    - Content-Type
    - Content-Length
    - Authorization
  credentials: true
  max_age: 3600