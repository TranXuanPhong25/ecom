apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications-service
  namespace: services
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifications
  template:
    metadata:
      labels:
        app: notifications
    spec:
      containers:
        - name: notifications
          image: rengumin/notifications-svc:1.0
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: "notifications-pg-db.storages"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: DB_NAME
              value: mydatabase
            - name: SERVER_PORT
              value: "8080"
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: notifications-svc
  namespace: services
spec:
  type: ClusterIP
  selector:
    app: notifications
  ports:
    - protocol: TCP
      name: http
      port: 8080
      targetPort: 8080
